<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Page Not Found</title>
<meta name="description" content="This page doesn’t exist."/>
<style>
:root{
  --bg:#0e0e11;
  --bg-soft:#15151a;
  --text:#f4f1ea;
  --muted:#b8b4ab;
  --gold:#c7a24c;
  --line:rgba(255,255,255,.08);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:24px;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  background:linear-gradient(180deg,#0e0e11,#141419);
  color:var(--text);
}
.card{
  max-width:640px;
  width:100%;
  background:var(--bg-soft);
  border:1px solid var(--line);
  border-radius:16px;
  padding:28px;
}
h1{margin:0 0 12px;font-size:34px;line-height:1.2}
p{margin:0 0 20px;color:var(--muted)}
.btn{
  display:inline-block;
  text-decoration:none;
  font-weight:600;
  border-radius:10px;
  padding:12px 18px;
  background:var(--gold);
  color:#111;
}
</style>
</head>
<body>
  <main class="card">
    <h1>This page doesn’t exist.</h1>
    <p>The page you requested could not be found.</p>
    <a class="btn" href="/language-of-desire-library/">Back to Library</a>
  </main>
</body>
</html>
